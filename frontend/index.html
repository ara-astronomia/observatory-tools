<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observatory Tools — Frasso Sabino</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<div class="app-header">
  <div class="app-header-inner">
    <div class="app-logo">★ OBS<span>/tools</span></div>
    <nav class="tab-nav">
      <button class="tab-btn active" onclick="showPage('staralt')" id="btn-staralt">
        <span class="tb-icon">◎</span> StarAlt
      </button>
      <button class="tab-btn" onclick="showPage('snr')" id="btn-snr">
        <span class="tb-icon">◈</span> SNR Analyzer
      </button>
      <button class="tab-btn" onclick="showPage('etc')" id="btn-etc">
        <span class="tb-icon">◷</span> ETC
      </button>
      <button class="tab-btn" onclick="showPage('skymonitor')" id="btn-skymonitor">
        <span class="tb-icon">◌</span> Sky Monitor
      </button>
      <button class="tab-btn" onclick="showPage('help')" id="btn-help">
        <span class="tb-icon">?</span> Help
      </button>
    </nav>
  </div>
</div>

<!-- ── PAGES ────────────────────────────────────────────────────── -->
<div id="page-staralt" class="page active"></div>
<div id="page-snr"     class="page"></div>
