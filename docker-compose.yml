services:
  observatory-tools:
    build: .
    container_name: observatory-tools
    ports:
      - "8000:8000"
    volumes:
      # Persiste il DB SQLite fuori dal container
      - observatory_db:/app/backend/db
    restart: unless-stopped
    labels:
      # Heimdall
      - "heimdall.name=Observatory Tools"
      - "heimdall.description=Strumenti pianificazione osservativa — Frasso Sabino"
      - "heimdall.icon=telescope.png"
      - "heimdall.url=http://observatory-tools:8000"

volumes:
  observatory_db:
